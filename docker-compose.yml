version: "3.9"

services:
  # CLI pipeline runner - runs pipelines in an isolated container.
  # Docker socket is mounted so --isolator docker spawns containers via the
  # host daemon (Docker-socket approach; no privileged DinD daemon required).
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./examples:/app/examples:ro
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - cli

  # Web GUI service - pipeline dashboard and visualization
  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - thingfactory_db:/app/data
    environment:
      - DATABASE_URL=/app/data/thingfactory.db
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  thingfactory_db:
