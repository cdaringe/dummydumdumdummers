services:
  # CLI pipeline runner - runs pipelines in an isolated container.
  # Docker socket is mounted so --isolator docker spawns containers via the
  # host daemon (Docker-socket approach; no privileged DinD daemon required).
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./examples:/app/examples:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${THINGFACTORY_DATA_DIRNAME:-./data}:/app/data
    profiles:
      - cli

  # Web GUI service - pipeline dashboard and visualization
  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "${THINGFACTORY_PORT:-2001}:2001"
    volumes:
      - ${THINGFACTORY_DATA_DIRNAME:-./data}:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - THINGFACTORY_DATA_DIRNAME=/app/data
      - THINGFACTORY_ALLOWED_EXECUTORS=${THINGFACTORY_ALLOWED_EXECUTORS:-local}
      - NODE_ENV=production
    restart: unless-stopped
